name: Auto Version Bump

# Bumps pubspec version automatically and kicks off a release — the version
# "walks by itself" like the other Flutter projects.
#
# Flow (matches thaipromptadminapp / juntra):
#   merge PR to main  ─▶  read release:* label (default patch)
#                         bump pubspec X.Y.Z + always build+1
#                         commit "[skip ci]" + push tag vX.Y.Z
#                         ─▶ dispatch android-release.yml (build + publish)
#
# Why dispatch instead of relying on the tag push: a tag pushed with the default
# GITHUB_TOKEN does NOT fire a tag event, so the Release workflow would never run
# on its own (brain: "Flutter auto-update silently misses build-only releases").
#
# PR label → bump level:
#   release:major  1.2.3 → 2.0.0      release:minor  1.2.3 → 1.3.0
#   release:patch  1.2.3 → 1.2.4 (default)   release:build  X.Y.Z, build+1 only
#   release:skip   no release
# The build number ALWAYS increments (so versionCode always increases).

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      level:
        description: 'Bump level'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major, build]

permissions:
  contents: write
  actions: write

jobs:
  bump:
    # Only on a real merge (not a closed-without-merge PR), or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !contains(join(github.event.pull_request.labels.*.name, ','), 'release:skip'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decide bump level
        id: level
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LEVEL="${{ github.event.inputs.level }}"
          else
            LABELS=",${{ join(github.event.pull_request.labels.*.name, ',') }},"
            if   echo "$LABELS" | grep -q ',release:major,'; then LEVEL=major
            elif echo "$LABELS" | grep -q ',release:minor,'; then LEVEL=minor
            elif echo "$LABELS" | grep -q ',release:build,'; then LEVEL=build
            else LEVEL=patch
            fi
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "Bump level: $LEVEL"

      - name: Bump pubspec version
        id: bump
        working-directory: mobile
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d ' \r')
          VER="${RAW%%+*}"; BUILD="${RAW##*+}"
          [ "$BUILD" = "$RAW" ] && BUILD=0
          IFS='.' read -r MA MI PA <<< "$VER"
          case "${{ steps.level.outputs.level }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
            build) PA=$((PA+1)) ;;
          esac
          # Clean semver only — no +build suffix. versionCode comes from the CI
          # run_number (android-release.yml), so it still always increases.
          NEW="$MA.$MI.$PA"
          TAG="v$MA.$MI.$PA"
          sed -i -E "s/^version:.*/version: $NEW/" pubspec.yaml
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW (tag $TAG)"

      - name: Commit, tag, push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): bump to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.new }}"
          git push origin main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Trigger release build
        # The token-pushed tag won't auto-trigger android-release.yml, so dispatch it.
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run android-release.yml -f tag="${{ steps.bump.outputs.tag }}"
